<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Portal | NeuroSphere</title>
    <style>
        body { background: #000; color: #00ff96; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .access-box { border: 2px solid #00ff96; padding: 30px; border-radius: 15px; text-align: center; box-shadow: 0 0 20px #00ff96; max-width: 400px; }
        h2 { margin-bottom: 20px; letter-spacing: 2px; }
        input { background: #111; border: 1px solid #00ff96; color: #fff; padding: 10px; width: 80%; margin-bottom: 15px; text-align: center; }
        .btn-activate { background: #00ff96; color: #000; border: none; padding: 15px 25px; font-weight: bold; cursor: pointer; width: 90%; }
        .note { font-size: 0.6em; color: #555; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="access-box">
        <h2>CITIZEN REGISTRATION</h2>
        <p style="font-size: 0.8em;">SECURE YOUR LIVING VALUE IDENTITY</p>
        <input type="text" placeholder="FULL LEGAL NAME">
        <input type="text" placeholder="PIONEER REFERRAL ID (e.g., 011)">
        <button class="btn-activate" onclick="location.href='authority.html'">ACTIVATE SOVEREIGNTY</button>
        <div class="note">AUTHORIZED BY INDIE-FOUNDER | ANCHOR: €100.000</div>
    </div>
</body>
</html>
