<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genesis Portal | NeuroSphere</title>
    <style>
        :root { --primary: #00bcd4; --bg: #0a0a0a; --text: #e0e0e0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
               background-color: var(--bg); color: var(--text); display: flex; flex-direction: column; 
               align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; }
        .card { background: #1a1a1a; padding: 25px; border-radius: 15px; border: 1px solid #333; 
                max-width: 400px; width: 100%; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { color: var(--primary); font-size: 1.5rem; margin-bottom: 10px; text-align: center; }
        p { font-size: 0.9rem; line-height: 1.5; color: #aaa; margin-bottom: 20px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.8rem; margin-bottom: 5px; color: var(--primary); }
        input { width: 100%; padding: 12px; background: #222; border: 1px solid #444; border-radius: 8px; 
                color: white; box-sizing: border-box; font-family: monospace; }
        input[readonly] { background: #111; color: #666; cursor: not-allowed; }
        button { width: 100%; padding: 15px; background: var(--primary); border: none; border-radius: 8px; 
                 color: black; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        button:hover { opacity: 0.8; }
        .footer { margin-top: 20px; font-size: 0.7rem; color: #555; text-align: center; }
    </style>
</head>
<body>

<div class="card">
    <h1>Genesis Portal</h1>
    <p>Selamat datang di gerbang kedaulatan NeuroSphere. Silakan hubungkan Identitas Digital (IID) Anda dengan slot komunitas yang tersedia.</p>
    
    <div class="input-group">
        <label>SLOT TARGET (Auto-Detected)</label>
        <input type="text" id="slotParam" readonly placeholder="Menunggu QR Scan...">
    </div>

    <div class="input-group">
        <label>MASUKKAN IID ANDA</label>
        <input type="text" id="userIid" placeholder="IID-XXXX-XXXX-XXXX">
    </div>

    <button onclick="requestBinding()">AJUKAN BINDING</button>
    
    <div class="footer">
        Otoritas: <b>FOUNDER AUTHORITY</b><br>
        Status: Menunggu Konsensus Komunitas (9/9)
    </div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const slotValue = urlParams.get('slot');
    if (slotValue) {
        document.getElementById('slotParam').value = slotValue;
    }

    function requestBinding() {
        const iid = document.getElementById('userIid').value;
        if (!iid) {
            alert("Harap masukkan IID Anda terlebih dahulu.");
            return;
        }
        alert("Permintaan Binding Terkirim.\nStatus: PENDING\n\nMenunggu validasi manual oleh Founder dan persetujuan algoritma NeuroSphere.");
    }
</script>

</body>
</html>
